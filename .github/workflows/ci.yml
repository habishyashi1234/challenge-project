name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:

  # ── Build & Test ─────────────────────────────────────────────────────────────
  build:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: GCC
            conan_profile: profiles/linux-gcc

          - os: ubuntu-latest
            compiler: Clang
            conan_profile: profiles/linux-clang

          - os: windows-latest
            compiler: MSVC
            conan_profile: profiles/windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Set up MSVC environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: sudo apt-get install -y clang

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release --profile:host=${{ matrix.conan_profile }} --profile:build=${{ matrix.conan_profile }}

      - name: Configure
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: sudo apt-get install -y clang-format-14 clang-tidy-14 && sudo ln -sf /usr/bin/clang-format-14 /usr/bin/clang-format && sudo ln -sf /usr/bin/clang-tidy-14 /usr/bin/clang-tidy

      - name: Install Conan
        run: pip install conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-lint-${{ hashFiles('conanfile.py') }}

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release --profile:host=profiles/linux-gcc --profile:build=profiles/linux-gcc

      - name: Configure with clang-tidy
        run: cmake --preset conan-release -DENABLE_CLANG_TIDY=ON

      - name: Check clang-format
        run: cmake --build --preset conan-release --target format-check

      - name: Check clang-tidy
        run: cmake --build --preset conan-release

  # ── Sanitizers ───────────────────────────────────────────────────────────────
  sanitize:
    name: ASan + UBSan (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: GCC
            conan_profile: profiles/linux-gcc

          - compiler: Clang
            conan_profile: profiles/linux-clang

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: sudo apt-get install -y clang

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-asan-${{ matrix.compiler }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-asan-${{ matrix.compiler }}-

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release --profile:host=${{ matrix.conan_profile }} --profile:build=${{ matrix.conan_profile }}

      - name: Configure with sanitizers
        run: cmake --preset conan-release -DENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

  # ── Install & Package ────────────────────────────────────────────────────────
  package:
    name: Install & Package (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: GCC
            conan_profile: profiles/linux-gcc
            archive_ext: tar.gz

          - os: ubuntu-latest
            compiler: Clang
            conan_profile: profiles/linux-clang
            archive_ext: tar.gz

          - os: windows-latest
            compiler: MSVC
            conan_profile: profiles/windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Set up MSVC environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Clang
        if: matrix.compiler == 'Clang'
        run: sudo apt-get install -y clang

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Conan install
        run: conan install . --build=missing -s build_type=Release --profile:host=${{ matrix.conan_profile }} --profile:build=${{ matrix.conan_profile }}

      - name: Configure
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Install
        run: cmake --build --preset conan-release --target install
        env:
          DESTDIR: ${{ github.workspace }}/install

      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf challenge-${{ matrix.compiler }}.tar.gz -C ${{ github.workspace }}/install .

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ${{ github.workspace }}/install/* -DestinationPath challenge-MSVC.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: challenge-${{ matrix.compiler }}
          path: challenge-${{ matrix.compiler }}.${{ matrix.archive_ext }}

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, lint, package]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true